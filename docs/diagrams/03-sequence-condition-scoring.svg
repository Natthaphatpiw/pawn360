<svg viewBox="0 0 1500 660" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
<title>Astly - Sequence: Condition Scoring</title>
<desc>Sequence diagram of POST /api/analyze-condition: Claude Haiku vision precheck, Gemini rubric scoring with guards, and how the resulting aiCondition is blended downstream in the estimate, plus the current design-phase self-hosted model integration point.</desc>
<defs>
<marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#334155"/></marker>
<marker id="arA" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#64748b"/></marker>
<style>
.title{font-size:22px;font-weight:700;fill:#0f172a}
.sub{font-size:13px;fill:#475569}
.client{fill:#eef4fb;stroke:#3b6aa0;stroke-width:1.4}
.plat{fill:#eaf1f8;stroke:#1f4e79;stroke-width:1.4}
.ext{fill:#f1f1f3;stroke:#4b5563;stroke-width:1.4}
.ph{font-size:12px;font-weight:700;fill:#1f2937}
.life{stroke:#94a3b8;stroke-width:1.2;stroke-dasharray:4 4}
.msg{stroke:#334155;stroke-width:1.5;fill:none;marker-end:url(#ar)}
.ret{stroke:#64748b;stroke-width:1.4;fill:none;stroke-dasharray:5 4;marker-end:url(#arA)}
.self{stroke:#334155;stroke-width:1.5;fill:none;marker-end:url(#ar)}
.ml{font-size:11.5px;font-weight:500;fill:#1f2937}
.note{fill:#fff7ed;stroke:#d97706;stroke-width:1.2}
.nt{font-size:11px;font-weight:500;fill:#7c2d12}
.fut{fill:#f5f3ff;stroke:#7c3aed;stroke-width:1.3;stroke-dasharray:6 4}
.ft{font-size:11.5px;font-weight:600;fill:#4c1d95}
.div{stroke:#cbd5e1;stroke-width:1}
.dl{font-size:11px;font-weight:700;fill:#64748b}
</style>
</defs>
<rect x="0" y="0" width="1500" height="660" fill="#ffffff"/>
<text class="title" x="40" y="40">Astly  -  Sequence: Condition Scoring</text>
<text class="sub" x="40" y="62">POST /api/analyze-condition    -    produces the aiCondition consumed by the estimate pricing pipeline</text>

<!-- lifelines -->
<line class="life" x1="180" y1="120" x2="180" y2="560"/>
<line class="life" x1="465" y1="120" x2="465" y2="560"/>
<line class="life" x1="750" y1="120" x2="750" y2="560"/>
<line class="life" x1="1035" y1="120" x2="1035" y2="560"/>
<line class="life" x1="1320" y1="120" x2="1320" y2="560"/>

<!-- participants -->
<rect class="client" x="80" y="82" width="200" height="38" rx="5"/><text class="ph" x="180" y="106" text-anchor="middle">Borrower (LIFF)</text>
<rect class="plat" x="365" y="82" width="200" height="38" rx="5"/><text class="ph" x="465" y="106" text-anchor="middle">/api/analyze-condition</text>
<rect class="ext" x="650" y="82" width="200" height="38" rx="5"/><text class="ph" x="750" y="106" text-anchor="middle">Claude Haiku 4.5</text>
<rect class="ext" x="935" y="82" width="200" height="38" rx="5"/><text class="ph" x="1035" y="106" text-anchor="middle">Google Gemini</text>
<rect class="plat" x="1220" y="82" width="200" height="38" rx="5"/><text class="ph" x="1320" y="106" text-anchor="middle">/api/estimate</text>

<!-- messages -->
<line class="msg" x1="180" y1="152" x2="465" y2="152"/><text class="ml" x="322" y="145" text-anchor="middle">1. POST {images[1-6], itemType, brand, model}</text>
<path class="self" d="M465,184 h46 v22 h-46"/><text class="ml" x="525" y="190">2. validate (&lt;=10MB, &lt;=6 imgs) + normalize</text>
<line class="msg" x1="465" y1="234" x2="750" y2="234"/><text class="ml" x="607" y="227" text-anchor="middle">3. precheckImages (Haiku 4.5 vision, tool-use)</text>
<line class="ret" x1="750" y1="266" x2="465" y2="266"/><text class="ml" x="607" y="259" text-anchor="middle">4. {pass, detectedType, matchesExpected}</text>
<rect class="note" x="560" y="278" width="520" height="26" rx="4"/><text class="nt" x="570" y="295">If wrong item type / not the same item -> 400 reject (fail fast).</text>

<line class="msg" x1="465" y1="330" x2="1035" y2="330"/><text class="ml" x="750" y="323" text-anchor="middle">5. analyzeConditionWithGemini (gemini-3-flash-preview)</text>
<line class="ret" x1="1035" y1="362" x2="465" y2="362"/><text class="ml" x="750" y="355" text-anchor="middle">6. rubric: screen 35 / body 30 / buttons 20 / camera 10 / overall 5  ->  [0,1]</text>
<rect class="note" x="560" y="374" width="620" height="26" rx="4"/><text class="nt" x="570" y="391">Guard: totalScore &lt;= 30 or score &lt;= 0.3 is treated as an unusable photo (400), not a real low score.</text>

<line class="ret" x1="465" y1="426" x2="180" y2="426"/><text class="ml" x="322" y="419" text-anchor="middle">7. 200 { score = aiCondition, rubric, defects }</text>

<line class="div" x1="40" y1="448" x2="1460" y2="448"/><text class="dl" x="48" y="462">DOWNSTREAM (pricing)</text>
<line class="msg" x1="180" y1="490" x2="1320" y2="490"/><text class="ml" x="750" y="483" text-anchor="middle">8. POST /api/estimate { ..., aiCondition }</text>
<path class="self" d="M1320,512 h46 v22 h-46"/><text class="ml" x="1366" y="518">9. blend 0.6 x borrower + 0.4 x ai</text>

<rect class="fut" x="40" y="588" width="1420" height="48" rx="5"/>
<text class="ft" x="56" y="609">CURRENT DESIGN PHASE:  a self-hosted open-source vision model (image encoder + multi-task heads: condition, rubric sub-scores, defects, item-type) is being designed</text>
<text class="ft" x="56" y="627">to replace the Claude precheck and Gemini scoring behind the same provider abstraction. Rollout: shadow -> canary -> primary, with automatic LLM fallback.</text>
</svg>
